name: Crear IPA GNZ para iPhone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.6
  FLUTTER_REVISION: ee80f08bbf97172ec030b8751ceab557177a34a6

concurrency:
  group: gnz-ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Compilar iOS en macOS
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Obtener el codigo
        uses: actions/checkout@v7

      - name: Instalar la version exacta de Flutter
        shell: bash
        run: |
          set -euo pipefail
          git init "$RUNNER_TEMP/flutter"
          git -C "$RUNNER_TEMP/flutter" remote add origin https://github.com/flutter/flutter.git
          git -C "$RUNNER_TEMP/flutter" fetch --depth 1 origin \
            "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
          git -C "$RUNNER_TEMP/flutter" checkout --detach "$FLUTTER_VERSION"
          test "$(git -C "$RUNNER_TEMP/flutter" rev-parse HEAD)" = "$FLUTTER_REVISION"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Preparar dependencias
        shell: bash
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter --version
          flutter pub get

      - name: Verificar el proyecto
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze
          flutter test

      - name: Leer version de la aplicacion
        id: app_meta
        shell: bash
        run: |
          set -euo pipefail
          full_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          version="${full_version%%+*}"
          build="${full_version##*+}"
          test -n "$version"
          test -n "$build"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"

      - name: Compilar la aplicacion sin certificados
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios --release --no-codesign

      - name: Crear el archivo IPA
        shell: bash
        run: |
          set -euo pipefail
          app="build/ios/iphoneos/Runner.app"
          test -d "$app"
          chmod 755 "$app/Runner"
          while IFS= read -r -d '' framework; do
            executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$framework/Info.plist")"
            test -n "$executable"
            test -f "$framework/$executable"
            chmod 755 "$framework/$executable"
            test -x "$framework/$executable"
          done < <(find "$app/Frameworks" -type d -name '*.framework' -print0)
          mkdir -p build/ios/unsigned/Payload
          cp -R "$app" build/ios/unsigned/Payload/
          cd build/ios/unsigned
          ditto -c -k --sequesterRsrc --keepParent Payload GNZ-Admin-Pro-iOS-unsigned.ipa
          shasum -a 256 GNZ-Admin-Pro-iOS-unsigned.ipa > GNZ-Admin-Pro-iOS-unsigned.sha256

      - name: Validar el IPA antes de entregarlo
        shell: bash
        run: |
          set -euo pipefail
          ipa="build/ios/unsigned/GNZ-Admin-Pro-iOS-unsigned.ipa"
          verify="$RUNNER_TEMP/gnz-admin-ipa"
          rm -rf "$verify"
          mkdir -p "$verify"
          ditto -x -k "$ipa" "$verify"
          app="$verify/Payload/Runner.app"
          test -d "$app"
          test -x "$app/Runner"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Info.plist")" = "com.gnzoilservices.gnzAdminFlutter"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$app/Info.plist")" = "GNZ Admin Pro"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Info.plist")" = "${{ steps.app_meta.outputs.version }}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Info.plist")" = "${{ steps.app_meta.outputs.build }}"
          file "$app/Runner" | grep -q 'arm64'
          while IFS= read -r -d '' framework; do
            executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$framework/Info.plist")"
            test -x "$framework/$executable"
            file "$framework/$executable" | grep -q 'arm64'
          done < <(find "$app/Frameworks" -type d -name '*.framework' -print0)
          unzip -t "$ipa"

      - name: Guardar el IPA
        uses: actions/upload-artifact@v7
        with:
          name: GNZ-Admin-Pro-iOS-unsigned
          path: |
            build/ios/unsigned/GNZ-Admin-Pro-iOS-unsigned.ipa
            build/ios/unsigned/GNZ-Admin-Pro-iOS-unsigned.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publicar la version en GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ steps.app_meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "v$APP_VERSION"
          source_ipa="build/ios/unsigned/GNZ-Admin-Pro-iOS-unsigned.ipa"
          release_ipa="build/ios/unsigned/GNZ-Admin-Pro-$APP_VERSION.ipa"
          release_hash="build/ios/unsigned/GNZ-Admin-Pro-$APP_VERSION.sha256"
          cp "$source_ipa" "$release_ipa"
          shasum -a 256 "$release_ipa" > "$release_hash"
          gh release create "$GITHUB_REF_NAME" \
            "$release_ipa#GNZ-Admin-Pro-$APP_VERSION.ipa" \
            "$release_hash#GNZ-Admin-Pro-$APP_VERSION.sha256" \
            --title "GNZ Admin Pro $APP_VERSION" \
            --notes "Version $APP_VERSION para iPhone, validada para instalar y actualizar con AltStore."

      - name: Actualizar Source de AltStore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APP_VERSION: ${{ steps.app_meta.outputs.version }}
          APP_BUILD: ${{ steps.app_meta.outputs.build }}
        shell: bash
        run: |
          set -euo pipefail
          ipa="build/ios/unsigned/GNZ-Admin-Pro-$APP_VERSION.ipa"
          size="$(stat -f%z "$ipa")"
          date="$(date -u +%F)"
          download_url="https://github.com/VisualNetworkDev/gnz-admin-app/releases/download/v$APP_VERSION/GNZ-Admin-Pro-$APP_VERSION.ipa"

          git fetch origin main
          git checkout -B update-altstore-source origin/main
          temporary="$(mktemp)"
          jq \
            --arg version "$APP_VERSION" \
            --arg build "$APP_BUILD" \
            --arg date "$date" \
            --arg downloadURL "$download_url" \
            --argjson size "$size" \
            '.apps[0].versions = ([{
              version: $version,
              buildVersion: $build,
              date: $date,
              localizedDescription: ("Actualizacion GNZ Admin Pro " + $version + "."),
              downloadURL: $downloadURL,
              size: $size,
              minOSVersion: "13.0"
            }] + [.apps[0].versions[] | select(.version != $version or .buildVersion != $build)])' \
            altstore-source.json > "$temporary"
          mv "$temporary" altstore-source.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: publish AltStore metadata for $APP_VERSION"
          git push origin HEAD:main

      - name: Resumen
        shell: bash
        run: |
          {
            echo "## GNZ Admin Pro para iPhone"
            echo
            echo "El artefacto **GNZ-Admin-Pro-iOS-unsigned** contiene el IPA validado para instalar con AltStore."
          } >> "$GITHUB_STEP_SUMMARY"
